output_dir: ./output

segment:
  min_gap_height: 10
  gap_threshold: 240
  blank_row_ratio: 0.95
  min_panel_height: 100
  similarity_threshold: 0.7

analyze:
  model: claude-sonnet-4-20250514
  max_context_panels: 10

generate:
  first_model: bytedance/seedance-2.0/image-to-video
  model: bytedance/seedance-2.0/reference-to-video
  duration: "5"
  seed: 42
  resolution: "720p"
  generate_audio: false
